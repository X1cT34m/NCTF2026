<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登录</title>
  <style>
    :root{
      --text: #111;
      --muted: #666;
      --line: #d9d9d9;
      --line-focus: #111;
      --bg: #fff;
    }
    *{ box-sizing: border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue",
                   Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap{
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card{
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    /* 图片 */
    .hero{
      width: 160px;
      height: 160px;
      object-fit: contain;
      display: block;
      margin: 0 auto 28px;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* 表单 */
    form{
      display: grid;
      gap: 18px;
      text-align: left;
    }
    .field label{
      display:block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: .2px;
    }

    .field input{
      width: 100%;
      border: none;
      border-bottom: 1px solid var(--line);
      padding: 10px 0;
      font-size: 14px;
      outline: none;
      background: transparent;
      color: var(--text);
    }
    .field input::placeholder{ color:#aaa; }
    .field input:focus{
      border-bottom-color: var(--line-focus);
    }

    .actions{
      display:flex;
      align-items:center;
      justify-content: space-between;
      margin-top: 6px;
    }
    .btn{
      width: 100%;
      border: 1px solid #111;
      background: #111;
      color: #fff;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: transform .02s ease, opacity .2s ease;
    }
    .btn:active{ transform: scale(0.99); }
    .btn:hover{ opacity: .92; }

    .hint{
      text-align:center;
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <img class="hero" src="{{ url_for('static', filename='images/horse.jpg') }}" alt="Logo" onerror="this.style.display='none';" />

      <form id="loginForm" autocomplete="on" action="/" method="GET">
        <div class="field">
          <label for="account">账号</label>
          <input id="account" name="username" type="text" placeholder="请输入账号" required />
        </div>

        <div class="field">
          <label for="password">密码</label>
          <input id="password" name="password" type="password" placeholder="请输入密码" required />
        </div>

        <button class="btn" type="submit">登录</button>
      </form>

      {{ login_msg|safe }}

      <div class="hint">© NCTF MA</div>
    </div>
  </div>

</body>
</html>
